version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: samsearch-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-samsearch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-samsearch_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-samsearch}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-samsearch}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - samsearch-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: samsearch-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - samsearch-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: samsearch-backend
    environment:
      - APP_ENV=development
      - DEBUG=true
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-samsearch}:${POSTGRES_PASSWORD:-samsearch_dev_password}@postgres:5432/${POSTGRES_DB:-samsearch}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production-min-32-chars}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
    volumes:
      - ./backend:/app
      - /app/__pycache__
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - samsearch-network

  # Celery Worker
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: samsearch-celery-worker
    command: celery -A app.tasks.celery_app worker --loglevel=info
    environment:
      - APP_ENV=development
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-samsearch}:${POSTGRES_PASSWORD:-samsearch_dev_password}@postgres:5432/${POSTGRES_DB:-samsearch}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production-min-32-chars}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - ./backend:/app
      - /app/__pycache__
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - samsearch-network

  # Celery Beat (Scheduler)
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: samsearch-celery-beat
    command: celery -A app.tasks.celery_app beat --loglevel=info
    environment:
      - APP_ENV=development
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-samsearch}:${POSTGRES_PASSWORD:-samsearch_dev_password}@postgres:5432/${POSTGRES_DB:-samsearch}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production-min-32-chars}
    volumes:
      - ./backend:/app
      - /app/__pycache__
    depends_on:
      - celery-worker
    networks:
      - samsearch-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: samsearch-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - samsearch-network

  # Flower (Celery Monitoring) - Development only
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: samsearch-flower
    command: celery -A app.tasks.celery_app flower --port=5555
    environment:
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - celery-worker
    networks:
      - samsearch-network

volumes:
  postgres_data:
  redis_data:

networks:
  samsearch-network:
    driver: bridge
